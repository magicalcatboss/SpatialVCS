version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: spatialvcs-postgres
    environment:
      POSTGRES_DB: spatialvcs
      POSTGRES_USER: spatial
      POSTGRES_PASSWORD: spatial
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spatialvcs-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
      - ./key.pem:/app/key.pem
      - ./cert.pem:/app/cert.pem
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://spatial:spatial@postgres:5432/spatialvcs
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spatialvcs-frontend
    ports:
      - "5173:5173"
    volumes:
      # Mount source code for hot reload (optional, but good for dev)
      - ./frontend/src:/app/src
      - ./key.pem:/app/key.pem
      - ./cert.pem:/app/cert.pem
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
